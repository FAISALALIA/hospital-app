<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home - SHRI RAM SANEHI MEMORIAL HOSPITAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hospital Header -->
  <div class="hospital-header">
    <img src="https://cdn-icons-png.flaticon.com/512/4006/4006511.png" alt="Hospital Logo">
    <div class="header-text">
      <h1>SHRI RAM SANEHI MEMORIAL HOSPITAL</h1>
      <p>Care With Compassion</p>
    </div>
  </div>

  <div class="container">
    <h2>Welcome, <span id="userName"></span> 👋</h2>
    
    <!-- User Info - Sirf Name aur Phone/Email -->
    <div class="info-box">
      <strong>Mobile:</strong> <span id="userPhone"></span><br>
      <strong>Email:</strong> <span id="userEmail"></span>
    </div>

    <p style="text-align: center; margin: 20px 0;">Book your appointment with our expert doctors easily.</p>
    
    <button onclick="window.location.href='booking.HTML'">Book Appointment</button>
    <button class="btn-secondary" onclick="window.location.href='response.HTML'">View All Bookings</button>
    <button class="btn-red" onclick="logout()">Logout</button>
  </div>

  <script>
    // Check login
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    if(!currentUser) {
      window.location.href = 'index.html';
    } else {
      // Sirf safe details show karo - PASSWORD KABHI NAHI
      document.getElementById('userName').innerText = currentUser.name;
      document.getElementById('userPhone').innerText = currentUser.phone;
      document.getElementById('userEmail').innerText = currentUser.email;
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

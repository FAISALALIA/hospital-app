<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home - SHRI RAM SANEHI MEMORIAL HOSPITAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hospital Header -->
  <div class="hospital-header">
    <img src="https://cdn-icons-png.flaticon.com/512/4006/4006511.png" alt="Hospital Logo">
    <div class="header-text">
      <h1>SHRI RAM SANEHI MEMORIAL HOSPITAL</h1>
      <p>Care With Compassion</p>
    </div>
  </div>

  <div class="container">
    <h2>Welcome, <span id="userName"></span> 👋</h2>
    
    <!-- User Info - Sirf Name aur Phone/Email -->
    <div class="info-box">
      <strong>Mobile:</strong> <span id="userPhone"></span><br>
      <strong>Email:</strong> <span id="userEmail"></span>
    </div>

    <p style="text-align: center; margin: 20px 0;">Book your appointment with our expert doctors easily.</p>
    
    <button onclick="window.location.href='booking.HTML'">Book Appointment</button>
    <button class="btn-secondary" <h3>Apni Appointment Check Karein</h3>
    <div class="check-section">
      <h3>Apni Appointment Check Karein</h3>
      
      <input type="tel" id="mobile" placeholder="Enter 10 digit mobile number" maxlength="10" style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px;">
      <button onclick="checkStatus()" id="checkBtn" style="width: 100%; padding: 12px; background: #c41e3a; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px;">Check Status</button>
      
      <div id="result" style="margin-top: 20px; padding: 15px; border-radius: 5px; display: none; line-height: 1.6;"></div>
    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfSWpZuYuGZzjvB_7278hJBW_-4SVxP7n9cJqC6DS2u9qM4amgvFNkPQcg5U8336fN/exec";
      
      function checkStatus() {
        var mobile = document.getElementById('mobile').value;
        var resultDiv = document.getElementById('result');
        var btn = document.getElementById('checkBtn');
        
        if(mobile.length!== 10) {
          resultDiv.style.display = 'block';
          resultDiv.style.background = '#f8d7da';
          resultDiv.style.color = '#721c24';
          resultDiv.style.border = '1px solid #f5c6cb';
          resultDiv.innerHTML = 'Please enter 10 digit mobile number';
          return;
        }
        
        btn.disabled = true;
        resultDiv.style.display = 'block';
        resultDiv.style.background = '#e2e3e5';
        resultDiv.style.color = '#383d41';
        resultDiv.innerHTML = 'Checking...';
        
        var script = document.createElement('script');
        script.src = SCRIPT_URL + "?action=check&mobile=" + mobile + "&callback=handleResponse";
        document.body.appendChild(script);
      }
      
      function handleResponse(response) {
        var resultDiv = document.getElementById('result');
        var btn = document.getElementById('checkBtn');
        btn.disabled = false;
        
        if(response.includes('Invalid') || response.includes('No booking') || response.includes('Error')) {
          resultDiv.style.background = '#f8d7da';
          resultDiv.style.color = '#721c24';
          resultDiv.style.border = '1px solid #f5c6cb';
        } else {
          resultDiv.style.background = '#d4edda';
          resultDiv.style.color = '#155724';
          resultDiv.style.border = '1px solid #c3e6cb';
        }
        resultDiv.innerHTML = response.replace(/\|/g, '<br>');
      }
    </script>
  </iframe>
</div>
    <button class="btn-red" onclick="logout()">Logout</button>
    <script>
function logout(){
  localStorage.removeItem('currentUser'); // login data delete
  alert('Logged out successfully');
  window.location.href = 'index.html'; // seedha login page pe
}
</script>
  </div>

  <script>
    // Check login
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    if(!currentUser) {
      window.location.href = 'index.html';
    } else {
      // Sirf safe details show karo - PASSWORD KABHI NAHI
      document.getElementById('userName').innerText = currentUser.name;
      document.getElementById('userPhone').innerText = currentUser.phone;
      document.getElementById('userEmail').innerText = currentUser.email;
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

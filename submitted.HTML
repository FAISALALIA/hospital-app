<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Submitted - Booking App</title>
  <style>
    body { font-family: Arial; background: #f0f2f5; text-align: center; padding-top: 100px; }
    .box { background: white; display: inline-block; padding: 40px; border-radius: 10px; }
    .btn { padding: 12px 24px; background: #1877f2; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>
    <!-- Hospital Header -->
  <div class="hospital-header">
    <img src="hospital-logo.png" alt="Hospital Logo">
    <div class="header-text">
      <h1>SHRI RAM SANEHI MEMORIAL HOSPITAL</h1>
      <p>Care With Compassion</p>
    </div>
  </div>
  <div class="box">
    <h1>✅ Request Submitted!</h1>
    <p id="details"></p>
    <button class="btn" onclick="window.location.href='response.html'">Check Status</button>
  </div>

  <script>
    const booking = JSON.parse(localStorage.getItem('booking'));
    document.getElementById('details').innerText = 
      `${booking.name}, aapki ${booking.service} booking ${booking.age} ke liye receive ho gayi hai.`;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - SRS Hospital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="box">
      <h2>SRS Hospital</h2>
      <h3>Book Your Appointment</h3>
      
      <input type="text" id="name" placeholder="Patient ka Naam" required>
      <input type="number" id="age" placeholder="Age" required>
      <input type="text" id="problem" placeholder="Problem / Bimari" required>
      <input type="date" id="date" required>
      <input type="time" id="time" required>
      
      <button id="bookBtn">Book Appointment</button>
      <p><a href="response.html">Check Booking Status</a></p>
    </div>
  </div>

<script>
// Check karo user login hai ya nahi
var mobile = localStorage.getItem('currentUser');
if(!mobile){
  alert("Pehle login karo");
  window.location.href = 'index.html';
}

// YAHAN APNA GOOGLE APPS SCRIPT KA URL DAALNA
const SHEET_URL = https://script.google.com/macros/s/AKfycbxbY1nlrtREfjRYCUdjWFEV0wTP4nQa15NPBamXAmxOoafZwtub5flmtBlOWwjj_qb9/exec;

function submitBooking(){
  var name = document.getElementById('name').value;
  var age = document.getElementById('age').value;
  var problem = document.getElementById('problem').value;
  var date = document.getElementById('date').value;
  var time = document.getElementById('time').value;

  if(name == "" || age == "" || problem == "" || date == "" || time == ""){
    alert("Sabhi details bharo bhai");
    return;
  }

  document.getElementById('bookBtn').disabled = true;
  document.getElementById('bookBtn').innerText = 'Booking...';

  fetch(SHEET_URL, {
    method: 'POST',
    body: JSON.stringify({
      name: name,
      mobile: mobile,
      age: age,
      problem: problem,
      date: date,
      time: time
    })
  })
  .then(response => {
    alert("Booking Successful! Doctor ka reply response page pe check karte raho");
    window.location.href = 'response.html';
  })
  .catch(error => {
    alert("Kuch error aa gaya. Net check karo ya URL sahi daala hai check karo");
    document.getElementById('bookBtn').disabled = false;
    document.getElementById('bookBtn').innerText = 'Book Appointment';
  });
}

document.getElementById('bookBtn').onclick = submitBooking;
</script>

</body>
</html>

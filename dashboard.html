<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - SRS Hospital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; padding:0; background:#f0f0f0; font-family:Arial; }
    .topbar { 
      background:#00a651; padding:12px; text-align:center; color:white; 
      display:flex; justify-content:center; align-items:center; flex-wrap:wrap;
    }
    .topbar span { margin-right:15px; }
    .topbar a { 
      color:white; margin:0 12px; text-decoration:none; font-weight:bold; cursor:pointer; 
      padding:5px 10px; border-radius:4px;
    }
    .topbar a:hover { background:#008543; }
  </style>
</head>
<body>
  <script>
    // Login check - bina login ke ye page nahi khulega
    if(!localStorage.getItem('loggedInUser')) {
      window.location.href = 'index.html';
    }
  </script>

  <!-- Top Bar with Logout -->
  <div class="topbar">
    <span id="welcome"></span>
    <a href="booking.html">Book Appointment</a>
    <a onclick="logout()">Logout</a>
  </div>

  <!-- 23 Tareekh wala Green Check Status Box -->
  <iframe
    src="https://script.google.com/macros/s/AKfycbxfSWpZuYuGZzjvB_7278hJBW_-4SVxP7n9cJqC6DS2u9qM4amgvFNkPQcg5U8336fN/exec"
    width="100%"
    height="700"
    frameborder="0"
    scrolling="no"
    style="display:block;">
  </iframe>

  <script>
    var user = localStorage.getItem('loggedInUser');
    document.getElementById('welcome').innerText = 'Welcome: ' + user + ' | ';
    
    function logout() {
      localStorage.removeItem('loggedInUser');
      window.location.href = 'index.html'; // Login page pe bhej dega
    }
  </script>
</body>
</html>

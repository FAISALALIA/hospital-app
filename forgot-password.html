<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Booking App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #f0f2f5; }
   .container { max-width: 400px; margin: 40px auto; padding: 30px; background: white; border-radius: 10px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #1877f2; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
   .back-link { text-align: center; margin-top: 15px; }
   .error { color: red; font-size: 13px; margin: -5px 0 5px 0; }
   .hidden { display: none; }
   .or-text { text-align: center; margin: 10px 0; color: #666; }
    a { color: #1877f2; text-decoration: none; }
  </style>
</head>
<body>
     <!-- Hospital Header -->
  <div class="hospital-header">
    <img src="hospital-logo.png" alt="Hospital Logo">
    <div class="header-text">
      <h1>SHRI RAM SANEHI MEMORIAL HOSPITAL</h1>
      <p>Care With Compassion</p>
    </div>
  </div>
  <div class="container">
    <h2>Reset Password</h2>

    <!-- Step 1: Email ya Phone verify -->
    <div id="step1">
      <p>Apna registered Email ya Phone Number daalo</p>
      <input type="text" id="resetInput" placeholder="Email ya Phone Number" required>
      <div id="inputError" class="error"></div>
      <button onclick="checkUser()">Verify Account</button>
    </div>

    <!-- Step 2: New password -->
    <div id="step2" class="hidden">
      <p>Hi <span id="userName"></span>, naya password set karo</p>
      <input type="password" id="newPassword" placeholder="New Password (min 8 characters)" minlength="8" required>
      <input type="password" id="confirmNewPassword" placeholder="Confirm New Password" required>
      <div id="passwordError" class="error"></div>
      <button onclick="updatePassword()">Update Password</button>
    </div>

    <div class="back-link">
      <a href="login.html">Back to Login</a>
    </div>
  </div>

  <script>
    let currentUserIndex = -1;
    let users = JSON.parse(localStorage.getItem('users')) || [];

    function checkUser() {
      const input = document.getElementById('resetInput').value.trim();
      document.getElementById('inputError').innerText = '';

      if(input === '') {
        document.getElementById('inputError').innerText = 'Email ya Phone daalo';
        return;
      }

      // Email ya Phone se user dhundo
      currentUserIndex = users.findIndex(u => u.email === input || u.phone === input);

      if(currentUserIndex === -1) {
        document.getElementById('inputError').innerText = 'Ye Email/Phone registered nahi hai';
        return;
      }

      // User mil gaya, step 2 dikhao
      document.getElementById('userName').innerText = users[currentUserIndex].name;
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
    }

    function updatePassword() {
      const newPass = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmNewPassword').value;
      document.getElementById('passwordError').innerText = '';

      if(newPass.length < 8) {
        document.getElementById('passwordError').innerText = 'Password kam se kam 8 digit ka ho';
        return;
      }
      if(newPass!== confirmPass) {
        document.getElementById('passwordError').innerText = 'Dono password same nahi hain';
        return;
      }

      // Password update karo
      users[currentUserIndex].password = newPass;
      localStorage.setItem('users', JSON.stringify(users));
      alert('Password update ho gaya! Ab login karo');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>

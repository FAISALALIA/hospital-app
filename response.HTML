<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Status - Booking App</title>
  <style>
    body { font-family: Arial; background: #f0f2f5; }
    .container { max-width: 500px; margin: 40px auto; padding: 30px; background: white; border-radius: 10px; text-align: center; }
    .status { padding: 15px; background: #e7f3ff; border-left: 4px solid #1877f2; margin: 20px 0; }
    .btn { padding: 12px 24px; background: #42b72a; color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
     <!-- Hospital Header -->
  <div class="hospital-header">
    <img src="hospital-logo.png" alt="Hospital Logo">
    <div class="header-text">
      <h1>SHRI RAM SANEHI MEMORIAL HOSPITAL</h1>
      <p>Care With Compassion</p>
    </div>
  </div>
  <div class="container">
    <h2>Booking Status</h2>
    <div class="status" id="statusBox">
      <h3>Status: Confirmed ✅</h3>
      <p id="bookDetails"></p>
    </div>
    <button class="btn" onclick="window.location.href='home.HTML'">Back to Home</button>
  </div>

  <script>
    const booking = JSON.parse(localStorage.getItem('booking'));
    if(booking) {
      document.getElementById('bookDetails').innerHTML = `
        <b>Name:</b> ${booking.name}<br>
        <b>Service:</b> ${booking.service}<br>
        <b>Age:</b> ${booking.age}<br>
        <b>Phone:</b> ${booking.phone}
      `;
    }
  </script>
</body>
</html>

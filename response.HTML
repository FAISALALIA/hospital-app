<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Status - SRS Hospital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="box">
      <h2>Your Booking Status</h2>
      <p><b>Name:</b> <span id="name">Loading...</span></p>
      <p><b>Status:</b> <span id="status">Loading...</span></p>
      <p><b>Doctor Reply:</b> <span id="reply">Loading...</span></p>
      <p><b>Appointment:</b> <span id="apptime">Loading...</span></p>
      <br>
      <button onclick="location.reload()">Refresh Status</button>
      <p><a href="booking.html">Book New Appointment</a></p>
    </div>
  </div>

<script>
var mobile = localStorage.getItem('currentUser');
if(!mobile){
  alert("Pehle login karo");
  window.location.href = 'index.html';
}

// YAHI WAHI URL JO BOOKING.HTML ME DAALA THA
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxbY1nlrtREfjRYCUdjWFEV0wTP4nQa15NPBamXAmxOoafZwtub5flmtBlOWwjj_qb9/exec';

function checkStatus(){
  fetch(SHEET_URL + '?mobile=' + mobile)
  .then(res => res.json())
  .then(data => {
    if(data.status == "Not Found"){
      document.getElementById('status').innerText = "Koi booking nahi mili";
      document.getElementById('reply').innerText = "Pehle booking karo";
    } else {
      document.getElementById('name').innerText = data.name || 'Patient';
      document.getElementById('status').innerText = data.status;
      document.getElementById('reply').innerText = data.reply || 'Doctor will reply soon';
      document.getElementById('apptime').innerText = data.date + ' ko ' + data.time;
    }
  })
  .catch(err => {
    document.getElementById('status').innerText = "Error: Net check karo";
  });
}

// Page load hote hi check kar
checkStatus();

// Har 10 sec me auto refresh
setInterval(checkStatus, 10000);
</script>

</body>
</html>
